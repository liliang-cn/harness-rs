    <!-- Schema.org structured data — both crawlers and LLMs read JSON-LD.
         The SoftwareApplication type with offers + featureList is what
         shows up in Google rich results and gets quoted by LLMs in product
         comparison queries (GEO). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Dashboard",
        "alternateName": "工作台",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": "Web",
        "description": "AI-powered cockpit for independent developers and one-person companies. Manage money, projects, and notes — and ask your data in plain English or Chinese.",

        "inLanguage": ["en", "zh"],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Free trial — paid tiers unlock unlimited accounts and AI conversations"
        },
        "featureList": [
          "Net worth dashboard with multi-currency support",
          "Income & cost tracking with budgets and subscriptions",
          "Project management with milestones and progress reviews",
          "AI chat that knows your money, projects, and notes",
          "Semantic note search powered by Gemini embeddings",
          "Bilingual UI (English / Chinese)",
          "Self-hosted, no third-party data sharing"
        ]
      }
    </script>
