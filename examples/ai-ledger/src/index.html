<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fafaf8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14140f" media="(prefers-color-scheme: dark)">
<title>AI Ledger</title>
<style>
:root {
  --bg: #fafaf8;
  --panel: #ffffff;
  --ink: #1a1a1a;
  --muted: #777;
  --line: #e5e3dd;
  --accent: #2563eb;
  --user-bubble: #e8efff;
  --asst-bubble: #f3f3ef;
  --tool-bg: #f5f3ec;
  --pos: #15803d;
  --neg: #b91c1c;
  --over: #b91c1c;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14140f;
    --panel: #1d1d18;
    --ink: #ececea;
    --muted: #8a8a85;
    --line: #2c2c26;
    --accent: #60a5fa;
    --user-bubble: #1e3a8a55;
    --asst-bubble: #25251f;
    --tool-bg: #232319;
    --pos: #4ade80;
    --neg: #f87171;
    --over: #f87171;
  }
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; margin: 0; overflow: hidden; }
body {
  font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  color: var(--ink);
  background: var(--bg);
  display: grid;
  grid-template-columns: minmax(380px, 5fr) minmax(420px, 7fr);
  grid-template-rows: 100vh;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.tabs {
  display: none;
  grid-column: 1 / -1;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
}
.tab {
  flex: 1; appearance: none; background: transparent; color: var(--muted);
  border: 0; border-bottom: 2px solid transparent;
  font: inherit; font-weight: 600; cursor: pointer;
  padding: 0 8px; min-height: 44px;
}
.tab.active { color: var(--ink); border-bottom-color: var(--accent); }

.col {
  border-right: 1px solid var(--line);
  background: var(--panel);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
.col:last-child { border-right: none; background: var(--bg); }
.col-title {
  padding: 10px 16px;
  font-weight: 600;
  font-size: 13px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  background: var(--panel);
}
.col-title .badge { font-size: 11px; color: var(--muted); font-weight: normal; }
.header-btn {
  appearance: none; cursor: pointer;
  background: var(--bg); color: var(--ink);
  border: 1px solid var(--line); border-radius: 8px;
  font: inherit; font-size: 13px; line-height: 1;
  padding: 6px 10px; min-height: 32px;
}
.header-btn:hover { background: var(--panel); }
.col-title .grow { flex: 1; }

/* mode toggle inside dashboard header */
.mode-toggle { display: flex; gap: 2px; background: var(--bg); border-radius: 8px; padding: 2px; }
.mode-btn {
  appearance: none; background: transparent; border: 0; color: var(--muted);
  font: inherit; font-size: 12px; font-weight: 600; padding: 4px 10px;
  border-radius: 6px; cursor: pointer; min-height: 28px;
}
.mode-btn.active { background: var(--panel); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

/* chat */
.messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 8px;
  -webkit-overflow-scrolling: touch;
}
.msg { max-width: 88%; padding: 10px 14px; border-radius: 14px;
       white-space: pre-wrap; word-break: break-word; line-height: 1.55; }
.msg.user { align-self: flex-end; background: var(--user-bubble); }
.msg.asst { align-self: flex-start; background: var(--asst-bubble); }
.msg.asst.md { white-space: normal; }
.msg.asst.md p { margin: 0 0 8px; }
.msg.asst.md p:last-child { margin-bottom: 0; }
.msg.asst.md ul { margin: 4px 0 8px; padding-left: 22px; }
.msg.asst.md li { margin: 2px 0; }
.msg.asst.md strong { font-weight: 600; }
.msg.asst.md em { font-style: italic; }
.msg.asst.md code { background: rgba(0,0,0,.07); padding: 1px 5px; border-radius: 3px;
                    font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 0.9em; }
.msg.asst.md h1, .msg.asst.md h2, .msg.asst.md h3 { margin: 8px 0 4px; font-weight: 600; }
.msg.asst.md h1 { font-size: 1.15em; }
.msg.asst.md h2 { font-size: 1.10em; }
.msg.asst.md h3 { font-size: 1.05em; }
.msg.asst.md a { color: #2962ff; text-decoration: underline; }
.msg.asst.md ol { margin: 4px 0 8px; padding-left: 22px; }
.msg.asst.md pre { background: rgba(0,0,0,.07); padding: 10px 12px; border-radius: 6px;
                   overflow-x: auto; margin: 6px 0; }
.msg.asst.md pre code { background: transparent; padding: 0; font-size: 0.85em; }
.msg.asst.md blockquote { margin: 6px 0; padding: 4px 10px; border-left: 3px solid var(--muted);
                          color: var(--muted); }
.msg.asst.md table { border-collapse: collapse; margin: 6px 0; }
.msg.asst.md th, .msg.asst.md td { padding: 4px 8px; border: 1px solid rgba(0,0,0,.1); }
.msg.asst.md th { background: rgba(0,0,0,.04); }
.msg.asst.md del { color: var(--muted); }
.msg.asst.streaming { position: relative; }
.msg.asst.streaming::after {
  content: '▍'; color: var(--muted); margin-left: 2px;
  animation: blink 1.05s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.msg.meta { align-self: center; color: var(--muted); font-size: 12px;
            background: transparent; padding: 0; max-width: 100%; }
.msg .iters { font-size: 11px; color: var(--muted); margin-top: 4px; }

details.trace {
  align-self: flex-start; max-width: 92%;
  font: 12px/1.45 ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
  color: var(--muted);
  background: var(--tool-bg);
  border-radius: 10px;
  padding: 8px 12px;
}
details.trace > summary {
  cursor: pointer; list-style: none; user-select: none;
  display: flex; align-items: center; gap: 6px;
  color: var(--muted); font-weight: 600;
}
details.trace > summary::-webkit-details-marker { display: none; }
details.trace > summary::before {
  content: "▸"; display: inline-block; transition: transform 0.15s;
  color: var(--muted); width: 10px;
}
details.trace[open] > summary::before { transform: rotate(90deg); }
details.trace > .trace-body {
  display: flex; flex-direction: column; gap: 4px; margin-top: 6px;
}
.trace .ti { display: flex; gap: 6px; align-items: center; }
.trace .label { color: var(--accent); font-weight: 600; }
.trace .ok { color: var(--pos); }
.trace .fail { color: var(--neg); }
.trace pre {
  margin: 0; padding-left: 12px; white-space: pre-wrap; word-break: break-all;
  font: inherit; color: var(--muted);
}

.composer {
  border-top: 1px solid var(--line);
  padding: 10px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  display: flex; gap: 8px;
  background: var(--panel);
}
#input {
  flex: 1; resize: none; padding: 10px 12px; border-radius: 12px;
  border: 1px solid var(--line); background: var(--bg); color: var(--ink);
  font: inherit; min-height: 44px; max-height: 140px;
}
#input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
#send {
  min-width: 64px; min-height: 44px; padding: 0 16px;
  border-radius: 12px; border: 0;
  background: var(--accent); color: white; font: inherit; cursor: pointer;
  font-weight: 600;
}
#send:disabled { opacity: 0.5; cursor: not-allowed; }

/* dashboard */
.dash {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
  -webkit-overflow-scrolling: touch;
}
.dash-mode { display: none; flex-direction: column; gap: 16px; }
.dash-mode.active { display: flex; }

.card {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 14px; padding: 14px 16px;
}
.card h3 {
  margin: 0 0 10px 0; font-size: 12px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 8px;
}
.card h3 .grow { flex: 1; }
.btn-mini {
  appearance: none; background: var(--bg); border: 1px solid var(--line);
  color: var(--ink); font: inherit; font-size: 11px; font-weight: 600;
  padding: 4px 10px; min-height: 28px; border-radius: 8px; cursor: pointer;
}
.btn-mini:disabled { opacity: 0.5; cursor: not-allowed; }

.accounts { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.acc {
  background: var(--bg); border-radius: 10px; padding: 8px 10px;
  border: 1px solid var(--line);
}
.acc-name { font-size: 13px; font-weight: 500; }
.acc-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

.totals { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
.total-num {
  font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
  font-size: 28px; font-weight: 700;
}
.total-cur { color: var(--muted); font-size: 13px; margin-left: 4px; }
.cat-list { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.cat-row { display: grid; grid-template-columns: minmax(70px, 100px) 1fr 80px; align-items: center; gap: 8px; font-size: 13px; }
.cat-name { color: var(--ink); }
.cat-bar { height: 8px; background: var(--bg); border-radius: 999px; overflow: hidden; }
.cat-bar > i { display: block; height: 100%; background: var(--accent); border-radius: 999px; }
.cat-val { font-family: ui-monospace, monospace; text-align: right; font-size: 12px; color: var(--muted); }

.budget-row { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; font-size: 13px; padding: 6px 0; border-bottom: 1px dashed var(--line); }
.budget-row:last-child { border-bottom: 0; }
.budget-row .b-bar { grid-column: 1 / -1; height: 6px; background: var(--bg); border-radius: 999px; margin-top: 4px; overflow: hidden; }
.budget-row .b-bar > i { display: block; height: 100%; background: var(--pos); }
.budget-row.over .b-bar > i { background: var(--over); }
.budget-row .b-pct { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); }
.budget-row.over .b-pct { color: var(--over); font-weight: 600; }

table.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
table.tbl th, table.tbl td {
  text-align: left; padding: 7px 6px; border-bottom: 1px solid var(--line);
}
table.tbl th { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
table.tbl td.num { font-family: ui-monospace, monospace; text-align: right; font-weight: 500; }
table.tbl td.cat { color: var(--muted); }
table.tbl td.pos { color: var(--pos); }
table.tbl td.neg { color: var(--neg); }
table.tbl td.tx-expense { color: var(--neg); }
table.tbl td.tx-income  { color: var(--pos); }
table.tbl td.tx-transfer { color: var(--muted); }
.empty { color: var(--muted); font-size: 13px; padding: 8px 0; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--muted); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: -2px; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.kbd-hint { font-size: 11px; color: var(--muted); padding: 0 16px 6px; }

.portfolio-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
.portfolio-summary .cell { background: var(--bg); border-radius: 10px; padding: 10px 12px; border: 1px solid var(--line); }
.portfolio-summary .cell .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.portfolio-summary .cell .val { font-family: ui-monospace, monospace; font-size: 18px; font-weight: 700; margin-top: 2px; }
.portfolio-summary .cell .val.pos { color: var(--pos); }
.portfolio-summary .cell .val.neg { color: var(--neg); }

/* ─── Mobile overrides (must remain last) ─── */
@media (max-width: 760px) {
  /* Tables in cards collapse to vertical "row cards" on narrow screens.
     Each row becomes its own mini-card with label : value pairs. */
  .card table.tbl thead { display: none; }
  .card table.tbl,
  .card table.tbl tbody,
  .card table.tbl tr,
  .card table.tbl td { display: block; width: 100%; }
  .card table.tbl tr {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 6px 10px;
    margin-bottom: 8px;
    background: var(--bg);
  }
  .card table.tbl tr:last-child { margin-bottom: 0; }
  .card table.tbl td {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 0;
    text-align: left;
    font-size: 13px;
    gap: 8px;
  }
  .card table.tbl td:first-child {
    font-weight: 600;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    margin-bottom: 2px;
  }
  .card table.tbl td:first-child::before { content: ""; }
  .card table.tbl td::before {
    content: attr(data-label);
    color: var(--muted);
    font-size: 12px;
    flex-shrink: 0;
  }
  .card table.tbl td.num { text-align: right; }
  .card table.tbl td.empty { justify-content: center; }
  .card table.tbl td.empty::before { content: ""; }
  body {
    grid-template-columns: 1fr;
    grid-template-rows: 44px 1fr;
  }
  html, body { height: 100dvh; }
  .tabs { display: flex; }
  .col { border-right: none; }
  /* Slim col-title on mobile. */
  .col-title { font-size: 11px; padding: 6px 10px; gap: 4px; }
  /* Hide the leading "💬 Chat" / "📊 Dashboard" label since the tabs already say that. */
  .col-title .col-label { display: none; }
  /* The dash-col mode toggle is redundant with the top tabs on mobile. */
  .mode-toggle { display: none; }
  .kbd-hint { display: none; }
  #chatCol.hidden, #dashCol.hidden { display: none; }
  .portfolio-summary { grid-template-columns: 1fr; }
}
</style>
<script src="/marked.min.js" defer></script>
</head>
<body>

<!-- ─── auth overlay: shown when no valid token in localStorage ─── -->
<div id="authOverlay" style="display:none; position:fixed; inset:0; z-index:9999;
     background: var(--bg); align-items:center; justify-content:center;">
  <div style="max-width:380px; width:90%; background: var(--panel); border:1px solid var(--line);
       border-radius:14px; padding:24px;">
    <h2 style="margin:0 0 12px 0; font-size:18px">AI Ledger</h2>
    <div id="authTabs" style="display:flex; gap:4px; margin-bottom:16px; background:var(--bg); padding:3px; border-radius:8px;">
      <button class="auth-tab active" data-tab="login"
        style="flex:1; padding:6px 12px; border:0; border-radius:6px; background:var(--panel); font-weight:600; cursor:pointer">登录</button>
      <button class="auth-tab" data-tab="register"
        style="flex:1; padding:6px 12px; border:0; border-radius:6px; background:transparent; color:var(--muted); font-weight:600; cursor:pointer">注册</button>
    </div>
    <form id="authForm" style="display:flex; flex-direction:column; gap:10px;">
      <input id="authEmail" type="email" required placeholder="email"
        style="padding:10px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); font:inherit; min-height:44px;">
      <input id="authPassword" type="password" required minlength="6" placeholder="密码（至少 6 位）"
        style="padding:10px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); font:inherit; min-height:44px;">
      <input id="authInvite" type="text" placeholder="邀请码（可选，注册时填写解除 trial 限制）"
        style="padding:10px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); font:inherit; min-height:44px; display:none">
      <button type="submit" id="authSubmit"
        style="padding:10px; border:0; border-radius:10px; background:var(--accent); color:white; font:inherit; font-weight:600; min-height:44px; cursor:pointer">登录</button>
      <div id="authError" style="color:var(--neg); font-size:13px; min-height:18px"></div>
    </form>
  </div>
</div>

<!-- ─── change-password modal ─── -->
<div id="pwOverlay" style="display:none; position:fixed; inset:0; z-index:9998;
     background: rgba(0,0,0,0.4); align-items:center; justify-content:center;">
  <div style="max-width:380px; width:90%; background: var(--panel); border:1px solid var(--line);
       border-radius:14px; padding:24px;">
    <h2 style="margin:0 0 12px 0; font-size:16px">修改密码</h2>
    <form id="pwForm" style="display:flex; flex-direction:column; gap:10px;">
      <input id="pwOld" type="password" required minlength="6" placeholder="当前密码"
        style="padding:10px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); font:inherit; min-height:44px;">
      <input id="pwNew" type="password" required minlength="6" placeholder="新密码（至少 6 位）"
        style="padding:10px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); font:inherit; min-height:44px;">
      <input id="pwNew2" type="password" required minlength="6" placeholder="再输一次"
        style="padding:10px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); font:inherit; min-height:44px;">
      <div style="display:flex; gap:8px">
        <button type="button" id="pwCancel"
          style="flex:1; padding:10px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); font:inherit; min-height:44px; cursor:pointer">取消</button>
        <button type="submit" id="pwSubmit"
          style="flex:1; padding:10px; border:0; border-radius:10px; background:var(--accent); color:white; font:inherit; font-weight:600; min-height:44px; cursor:pointer">提交</button>
      </div>
      <div id="pwMsg" style="color:var(--neg); font-size:13px; min-height:18px"></div>
    </form>
  </div>
</div>

<nav class="tabs" id="tabs">
  <button class="tab active" data-tab="chat">💬 Chat</button>
  <button class="tab" data-tab="ledger">📊 记账</button>
  <button class="tab" data-tab="portfolio">📈 投资</button>
  <button class="tab" data-tab="profile">👤 我的</button>
</nav>

<section class="col" id="chatCol">
  <div class="col-title">
    <span class="col-label">💬 Chat</span>
    <span class="badge" id="modelBadge">connecting…</span>
  </div>
  <div class="messages" id="messages"></div>
  <div class="kbd-hint">Enter 发送 · Shift+Enter 换行</div>
  <div class="composer">
    <textarea id="input" placeholder="例：刚火锅花了 188，微信扣的 / 今天买了100股AAPL 198.42" enterkeyhint="send"></textarea>
    <button id="send">发送</button>
  </div>
</section>

<section class="col hidden" id="dashCol">
  <div class="col-title">
    <span class="badge" id="monthBadge"></span>
    <span class="grow"></span>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="ledger">📊 记账</button>
      <button class="mode-btn" data-mode="portfolio">📈 投资</button>
      <button class="mode-btn" data-mode="profile">👤 我的</button>
    </div>
  </div>

  <div class="dash">
    <!-- ── 记账 模式 ── -->
    <div class="dash-mode active" id="ledgerMode">
      <div class="card">
        <h3>账户</h3>
        <div class="accounts" id="accounts"></div>
      </div>
      <div class="card">
        <h3>本月支出 <span class="grow"></span><span style="font-weight:normal;font-size:11px;color:var(--muted)" id="monthBadge2"></span></h3>
        <div class="totals" id="grandTotal"></div>
        <div class="cat-list" id="cats"></div>
      </div>
      <div class="card">
        <h3>预算</h3>
        <div id="budgets"></div>
      </div>
      <div class="card">
        <h3>最近流水</h3>
        <table class="tbl"><thead><tr>
          <th>分类</th><th>时间</th><th>账户</th><th style="text-align:right">金额</th>
        </tr></thead><tbody id="txns"></tbody></table>
      </div>
      <div class="card">
        <h3>AI 月度简报 <span class="grow"></span>
          <button class="btn-mini" id="briefBtn">生成简报</button>
        </h3>
        <div id="briefBox" class="empty">点击右上"生成简报"——会用 LLM + 结构化输出（schema-constrained JSON）生成一份本月小结。</div>
      </div>
    </div>

    <!-- ── 投资 模式 ── -->
    <div class="dash-mode" id="portfolioMode">
      <div class="card">
        <h3>组合汇总 <span class="grow"></span>
          <button class="btn-mini" id="refreshBtn">刷新行情</button>
        </h3>
        <div class="portfolio-summary" id="portfolioSummary"></div>
      </div>
      <div class="card">
        <h3>持仓</h3>
        <table class="tbl"><thead><tr>
          <th>标的</th><th style="text-align:right">数量</th><th style="text-align:right">均价</th>
          <th style="text-align:right">现价</th><th style="text-align:right">市值</th><th style="text-align:right">盈亏</th>
        </tr></thead><tbody id="positions"></tbody></table>
      </div>
      <div class="card">
        <h3>交易记录 <span class="grow"></span><span style="font-weight:normal;font-size:11px;color:var(--muted)">仅 buy / sell</span></h3>
        <table class="tbl"><thead><tr>

<script>
// ─── auth bootstrap ───
const TOKEN_KEY = 'ai-ledger-token';
const ME_KEY = 'ai-ledger-me';
function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setAuth(token, user) {
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(ME_KEY, JSON.stringify(user));
}
function clearAuth() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(ME_KEY);
}
function getMe() {
  try { return JSON.parse(localStorage.getItem(ME_KEY) || 'null'); } catch { return null; }
}

// Wrap fetch so every /api/* call carries Authorization automatically,
// and 401 responses force a re-auth.
const _rawFetch = window.fetch.bind(window);
window.fetch = async (url, opts = {}) => {
  const t = getToken();
  if (t) {
    opts.headers = Object.assign({}, opts.headers || {}, { Authorization: 'Bearer ' + t });
  }
  const resp = await _rawFetch(url, opts);
  if (resp.status === 401 && (url + '').includes('/api/') && !(url + '').endsWith('/api/login') && !(url + '').endsWith('/api/register')) {
    clearAuth();
    showAuth();
  }
  return resp;
};

function showAuth() {
  document.getElementById('authOverlay').style.display = 'flex';
}
function hideAuth() {
  document.getElementById('authOverlay').style.display = 'none';
}

// Auth tab toggle
document.querySelectorAll('.auth-tab').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.auth-tab').forEach(x => {
    x.classList.remove('active');
    x.style.background = 'transparent';
    x.style.color = 'var(--muted)';
  });
  b.classList.add('active');
  b.style.background = 'var(--panel)';
  b.style.color = 'var(--ink)';
  const isRegister = b.dataset.tab === 'register';
  document.getElementById('authInvite').style.display = isRegister ? '' : 'none';
  document.getElementById('authSubmit').textContent = isRegister ? '注册' : '登录';
  document.getElementById('authError').textContent = '';
}));

document.getElementById('authForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const isRegister = document.querySelector('.auth-tab.active').dataset.tab === 'register';
  const url = isRegister ? '/api/register' : '/api/login';
  const body = {
    email: document.getElementById('authEmail').value.trim(),
    password: document.getElementById('authPassword').value,
  };
  if (isRegister) {
    const invite = document.getElementById('authInvite').value.trim();
    if (invite) body.invite_code = invite;
  }
  const err = document.getElementById('authError');
  err.textContent = '…';
  try {
    const r = await _rawFetch(url, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!r.ok) {
      err.textContent = j.error || '失败';
      return;
    }
    setAuth(j.token, j.user);
    hideAuth();
    location.reload();
  } catch (e) {
    err.textContent = e.message || '网络错误';
  }
});

if (!getToken()) {
  // Defer-show until DOM is settled
  setTimeout(showAuth, 0);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/// Markdown → HTML for chat replies, backed by vendored `marked` v15
/// (served from `/marked.min.js`). Pre-processing strips Gemini-grounding
/// citation markers (`[1]`, `[5]`); post-processing drops `<script>`,
/// `<iframe>`, and inline `on*=` event handlers so a prompt-injected LLM
/// can't ship executable HTML into our DOM.
///
/// Falls back to a minimal hand-rolled parser if `marked` failed to load
/// (e.g. the script tag was blocked on the user's network).
function renderMarkdown(text) {
  let s = String(text || '').replace(/\s*\[\d+\](?!\()/g, '');
  if (typeof window.marked !== 'undefined' && typeof window.marked.parse === 'function') {
    try {
      const html = window.marked.parse(s, { gfm: true, breaks: true });
      return sanitizeHtml(html);
    } catch (_) { /* fall through to fallback */ }
  }
  return fallbackMarkdown(s);
}

/// Minimal post-parse sanitiser. We're not aiming to defeat a determined
/// attacker — just to neutralise the obvious XSS vectors that an LLM
/// might emit (intentionally or otherwise).
function sanitizeHtml(html) {
  const doc = new DOMParser().parseFromString('<div id="r">' + html + '</div>', 'text/html');
  const root = doc.getElementById('r');
  for (const el of root.querySelectorAll('script, iframe, object, embed, style, link, meta')) {
    el.remove();
  }
  for (const el of root.querySelectorAll('*')) {
    for (const attr of [...el.attributes]) {
      if (/^on/i.test(attr.name)) el.removeAttribute(attr.name);
      if (attr.name === 'href' && /^\s*javascript:/i.test(attr.value)) el.removeAttribute(attr.name);
    }
    if (el.tagName === 'A') {
      el.setAttribute('target', '_blank');
      el.setAttribute('rel', 'noopener nofollow');
    }
  }
  return root.innerHTML;
}

/// Fallback used if `marked` didn't load. Handles the common LLM patterns
/// (**bold**, *italic*, `code`, lists, headings, links).
function fallbackMarkdown(s) {
  s = s.replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
  const inline = (str) => str
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^\*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener nofollow">$1</a>');
  const lines = s.split('\n');
  const out = [];
  let inList = false;
  let para = [];
  const flushPara = () => { if (para.length) { out.push('<p>' + inline(para.join(' ')) + '</p>'); para = []; } };
  const closeList = () => { if (inList) { out.push('</ul>'); inList = false; } };
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, '');
    if (line.trim() === '') { flushPara(); closeList(); continue; }
    const li = line.match(/^\s*[\-\*]\s+(.*)$/);
    if (li) {
      flushPara();
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + inline(li[1]) + '</li>');
      continue;
    }
    const h = line.match(/^(#{1,3})\s+(.*)$/);
    if (h) {
      flushPara(); closeList();
      out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`);
      continue;
    }
    closeList();
    para.push(line.trim());
  }
  flushPara(); closeList();
  return out.join('');
}

function addMessage(role, text, iters) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'asst') {
    div.classList.add('md');
    div.innerHTML = renderMarkdown(text);
  } else {
    div.textContent = text;
  }
  if (iters !== undefined) {
    const m = document.createElement('div');
    m.className = 'iters';
    m.textContent = `${iters} iter`;
    div.appendChild(m);
  }
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function addMeta(text, spinner) {
  const div = document.createElement('div');
  div.className = 'msg meta';
  div.innerHTML = (spinner ? '<span class="spinner"></span>' : '') + escapeHtml(text);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function newTrace() {
  const t = document.createElement('details');
  t.className = 'trace';
  t.open = true;
  const summary = document.createElement('summary');
  summary.textContent = '正在思考…';
  t.appendChild(summary);
  const body = document.createElement('div');
  body.className = 'trace-body';
  t.appendChild(body);
  t.body = body;
  t.summary = summary;
  t._iters = 0;
  t._tools = 0;
  messages.appendChild(t);
  messages.scrollTop = messages.scrollHeight;
  return t;
}

function appendTrace(t, html) {
  const row = document.createElement('div');
  row.className = 'ti';
  row.innerHTML = html;
  (t.body || t).appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function finalizeTrace(t, { iters = 0, tools = 0, ok = true } = {}) {
  if (!t.summary) return;
  const mark = ok ? '✓' : '✗';
  const parts = [`${mark} 思考过程`];
  if (iters) parts.push(`${iters} iter`);
  if (tools) parts.push(`${tools} tool`);
  t.summary.textContent = parts.join(' · ');
  t.open = false;
}

function fmtAmount(v, currency) {
  const n = Number(v);
  if (!Number.isFinite(n)) return String(v);
  const symbol = currency === 'CNY' ? '¥' : currency === 'USD' ? '$' : currency === 'EUR' ? '€' : currency + ' ';
  return symbol + n.toLocaleString('zh-CN', { maximumFractionDigits: 2 });
}

function fmtSigned(v, currency) {
  const n = Number(v);
  if (!Number.isFinite(n)) return String(v);
  const sign = n > 0 ? '+' : '';
  return sign + fmtAmount(v, currency);
}

function fmtDate(s) {
  try {
    const d = new Date(s);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const yesterday = new Date(now.getTime() - 86400000);
    const wasYesterday = d.toDateString() === yesterday.toDateString();
    if (sameDay) return '今天 ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    if (wasYesterday) return '昨天';
    return d.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
  } catch { return s; }
}

async function refreshAccounts() {
  const r = await fetch('/api/accounts').then(r => r.json());
  accountById = {};
  for (const a of r.accounts) accountById[a.id] = a;
  if (r.accounts.length === 0) {
    accBox.innerHTML = '<div class="empty">还没有账户。试试 "建一个微信账户"。</div>';
    return;
  }
  accBox.innerHTML = '';
  for (const a of r.accounts) {
    const el = document.createElement('div');
    el.className = 'acc';
    el.innerHTML = `<div class="acc-name">${escapeHtml(a.name)}</div>
                    <div class="acc-meta">${escapeHtml(a.kind)} · ${escapeHtml(a.currency)}</div>`;
    accBox.appendChild(el);
  }
}

async function refreshReport() {
  const r = await fetch('/api/report').then(r => r.json());
  const tag = `${r.year}-${String(r.month).padStart(2,'0')}`;
  monthBadge.textContent = tag;
  monthBadge2.textContent = tag;
  const totals = r.grand_total_by_currency || {};
  grand.innerHTML = '';
  if (Object.keys(totals).length === 0) {
    grand.innerHTML = '<div class="empty">本月还没有支出。</div>';
  } else {
    for (const cur of Object.keys(totals)) {
      const span = document.createElement('span');
      span.className = 'total-num';
      span.textContent = fmtAmount(totals[cur], cur);
      const cs = document.createElement('span');
      cs.className = 'total-cur';
      cs.textContent = cur;
      grand.appendChild(span);
      grand.appendChild(cs);
    }
  }
  catsBox.innerHTML = '';
  const cats = r.by_category || [];
  const max = cats.reduce((m, c) => Math.max(m, Number(c.total)), 0) || 1;
  for (const c of cats) {
    const pct = Math.max(2, Math.round(Number(c.total) / max * 100));
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `
      <span class="cat-name">${escapeHtml(c.category)}</span>
      <span class="cat-bar"><i style="width:${pct}%"></i></span>
      <span class="cat-val">${fmtAmount(c.total, c.currency)}</span>`;
    catsBox.appendChild(row);
  }
}

async function refreshBudgets() {
  const r = await fetch('/api/budgets').then(r => r.json());
  if (!r.budgets || r.budgets.length === 0) {
    budBox.innerHTML = '<div class="empty">还没有预算。试试 "给餐饮设 1500 预算"。</div>';
    return;
  }
  budBox.innerHTML = '';
  for (const b of r.budgets) {
    const used = Number(b.used), lim = Number(b.limit);
    const pct = Math.min(100, Math.round(used / Math.max(lim, 1) * 100));
    const row = document.createElement('div');
    row.className = 'budget-row' + (b.over_budget ? ' over' : '');
    row.innerHTML = `
      <span>${escapeHtml(b.category)}</span>
      <span class="cat-val">${fmtAmount(used, b.currency)} / ${fmtAmount(lim, b.currency)}</span>
      <span class="b-pct">${pct}%</span>
      <span class="b-bar"><i style="width:${pct}%"></i></span>`;
    budBox.appendChild(row);
  }
}

async function refreshTxns() {
  const r = await fetch('/api/transactions?limit=20').then(r => r.json());
  txnsBody.innerHTML = '';
  if (!r.transactions || r.transactions.length === 0) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="4" class="empty">还没有流水。</td>';
    txnsBody.appendChild(tr);
    return;
  }
  for (const t of r.transactions) {
    const tr = document.createElement('tr');

    const sign = t.kind === 'expense' ? '-' : t.kind === 'income' ? '+' : '⇄';
    const cat = t.category || (t.kind === 'transfer' ? '转账' : '(未分类)');
    tr.innerHTML = `
      <td><strong>${escapeHtml(cat)}</strong>${t.note ? ' <span style="font-weight:normal;color:var(--muted)">· ' + escapeHtml(t.note) + '</span>' : ''}</td>

      <td data-label="账户" class="cat">${escapeHtml(acc)}</td>
      <td class="num tx-${t.kind}" data-label="金额">${sign}${fmtAmount(t.amount, t.currency)}</td>`;
    txnsBody.appendChild(tr);
  }
}

async function refreshLedger() {
  await refreshAccounts();
  await Promise.all([refreshReport(), refreshBudgets(), refreshTxns()]);
}

const briefBtn = $('briefBtn');
const briefBox = $('briefBox');
briefBtn?.addEventListener('click', async () => {
  briefBtn.disabled = true;
  const old = briefBtn.textContent;
  briefBtn.innerHTML = '<span class="spinner"></span>生成中…';
  briefBox.innerHTML = '<div class="empty">LLM 正在调工具拉报表 → 结构化生成中…</div>';
  try {
    const resp = await fetch('/api/brief', {method: 'POST'});
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    const r = await resp.json();
    renderBrief(r);
  } catch (e) {
    briefBox.innerHTML = '<div class="empty">✗ 生成失败: ' + escapeHtml(e.message) + '</div>';
  }
  briefBtn.textContent = old;
  briefBtn.disabled = false;
});

function renderBrief(b) {
  const totalsRow = (b.total_by_currency || []).map(t =>
    `<span class="total-num">${escapeHtml(fmtAmount(t.total, t.currency))}</span><span class="total-cur">${escapeHtml(t.currency)}</span>`
  ).join(' ');
  const topRows = (b.top_categories || []).map(c =>
    `<div class="cat-row"><span class="cat-name">${escapeHtml(c.category)}</span><span class="cat-val">${escapeHtml(fmtAmount(c.total, c.currency))}</span></div>`
  ).join('');
  const overRows = (b.over_budget || []).length === 0
    ? '<div class="empty" style="padding:6px 0">无超预算项 ✓</div>'
    : (b.over_budget || []).map(o =>
        `<div class="budget-row over"><span>${escapeHtml(o.category)}</span><span class="cat-val">超 ${escapeHtml(fmtAmount(o.over_by, o.currency))} / 限 ${escapeHtml(fmtAmount(o.limit, o.currency))}</span></div>`
      ).join('');
  briefBox.innerHTML = `
    <div style="margin-bottom:10px;font-size:12px;color:var(--muted)">${b.year}-${String(b.month).padStart(2,'0')} 简报（schema-constrained JSON）</div>
    <div class="totals" style="margin-bottom:10px">${totalsRow || '<span class="empty">本月无支出</span>'}</div>
    <div style="font-size:12px;color:var(--muted);margin:8px 0 4px">Top 3 分类</div>
    <div class="cat-list">${topRows || '<div class="empty">无数据</div>'}</div>
    <div style="font-size:12px;color:var(--muted);margin:10px 0 4px">超预算</div>
    ${overRows}
    ${b.observation ? `<div style="margin-top:12px;padding:10px;background:var(--card-alt,#f7f7f9);border-radius:6px;font-size:13px">💡 ${escapeHtml(b.observation)}</div>` : ''}
  `;
}

async function refreshPositions() {
  const r = await fetch('/api/portfolio/positions').then(r => r.json());
  positionsBody.innerHTML = '';
  const alive = (r.positions || []).filter(p => Number(p.qty) > 0);
  if (alive.length === 0) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="6" class="empty">还没有持仓。试试 "今天买了 100 股 AAPL，198.42"。</td>';
    positionsBody.appendChild(tr);
    return;
  }
  for (const p of alive) {
    const upl = p.unrealized_pl !== null && p.unrealized_pl !== undefined ? Number(p.unrealized_pl) : null;
    const uplCls = upl === null ? '' : upl >= 0 ? 'pos' : 'neg';
    const last = p.last_price !== null && p.last_price !== undefined ? fmtAmount(p.last_price, p.currency) : '—';
    const mv = p.market_value !== null && p.market_value !== undefined ? fmtAmount(p.market_value, p.currency) : '—';
    const uplStr = upl === null ? '—' : fmtSigned(upl, p.currency);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${escapeHtml(p.symbol)}</strong> <span class="cat" style="font-size:11px">${escapeHtml(p.asset_class)}</span></td>
      <td class="num" data-label="数量">${fmtAmount(p.qty, '')}</td>
      <td class="num" data-label="均价">${fmtAmount(p.avg_cost, p.currency)}</td>
      <td class="num" data-label="现价">${last}</td>
      <td class="num" data-label="市值">${mv}</td>
      <td class="num ${uplCls}" data-label="盈亏">${uplStr}</td>`;
    positionsBody.appendChild(tr);
  }
}

async function refreshTrades() {
  const r = await fetch('/api/portfolio/trades?limit=100').then(r => r.json());
  // Only show actual buy/sell — opening entries are baseline data, not trades.
  const actual = (r.trades || []).filter(t => t.kind === 'buy' || t.kind === 'sell');

  const assetsResp = await fetch('/api/portfolio/assets').then(r => r.json());
  const byId = {};
  for (const a of (assetsResp.assets || [])) byId[a.asset.id] = a.asset;

  tradesBody.innerHTML = '';
  if (actual.length === 0) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="4" class="empty">还没有实际买卖记录。试试 "今天买入 100 股 AAPL 198.42"。</td>';
    tradesBody.appendChild(tr);
    return;
  }
  for (const t of actual.slice(0, 20)) {
    const sym = byId[t.asset_id]?.symbol || t.asset_id.slice(0, 6);
    const sign = t.kind === 'buy' ? '买' : '卖';
    const cls = t.kind === 'buy' ? 'pos' : 'neg';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${escapeHtml(sym)}</strong> <span class="${cls}" style="font-size:12px">${sign}</span></td>
      <td data-label="交易日">${escapeHtml(fmtDate(t.occurred_at))}</td>
      <td class="num" data-label="数量">${fmtAmount(t.qty, '')}</td>
      <td class="num" data-label="价">${fmtAmount(t.price_per_unit, t.currency)}</td>`;
    tradesBody.appendChild(tr);
  }
}

async function refreshSummary() {
  const r = await fetch('/api/portfolio/summary').then(r => r.json());
  portfolioSummary.innerHTML = '';
  const mv = r.market_value_by_currency || {};
  const upl = r.unrealized_pl_by_currency || {};
  const rpl = r.realized_pl_by_currency || {};
  if (Object.keys(mv).length === 0 && Object.keys(rpl).length === 0) {
    portfolioSummary.innerHTML = '<div class="empty">还没有数据。</div>';
    return;
  }
  const currencies = new Set([...Object.keys(mv), ...Object.keys(rpl)]);
  for (const cur of currencies) {
    const cells = [
      {label: `${cur} 市值`,    val: mv[cur] ?? '0', kind: 'plain'},
      {label: `${cur} 浮盈/亏`, val: upl[cur] ?? '0', kind: 'pl'},
      {label: `${cur} 已实现`,  val: rpl[cur] ?? '0', kind: 'pl'},
    ];
    for (const c of cells) {
      const n = Number(c.val);
      const cls = c.kind === 'pl' ? (n > 0 ? 'pos' : n < 0 ? 'neg' : '') : '';
      const txt = c.kind === 'pl' ? fmtSigned(c.val, cur) : fmtAmount(c.val, cur);
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.innerHTML = `<div class="label">${escapeHtml(c.label)}</div><div class="val ${cls}">${txt}</div>`;
      portfolioSummary.appendChild(cell);
    }
  }
  if (r.missing_prices_for && r.missing_prices_for.length > 0) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.gridColumn = '1 / -1';
    cell.innerHTML = `<div class="label">缺行情</div>
                      <div style="font-size:12px;color:var(--muted);margin-top:4px">
                        ${r.missing_prices_for.map(escapeHtml).join('、')} —— 点 "刷新行情"
                      </div>`;
    portfolioSummary.appendChild(cell);
  }
}

async function refreshPortfolio() {
  await Promise.all([refreshSummary(), refreshPositions(), refreshTrades()]);
}

refreshBtn?.addEventListener('click', async () => {
  refreshBtn.disabled = true;
  const old = refreshBtn.textContent;
  refreshBtn.innerHTML = '<span class="spinner"></span>刷新中';
  try {
    const r = await fetch('/api/portfolio/refresh-prices', {method: 'POST'}).then(r => r.json());
    addMeta(`已刷新 ${r.refreshed}/${r.total} 个标的行情`);
    await refreshPortfolio();
  } catch (e) {
    addMeta('✗ 刷新失败: ' + e.message);
  }
  refreshBtn.textContent = old;
  refreshBtn.disabled = false;
});

async function fetchModelInfo() {
  try {
    const r = await fetch('/api/info').then(r => r.json());
    modelBadge.textContent = `${r.provider}/${r.model}`;
  } catch { modelBadge.textContent = 'offline'; }
}

// ─── 👤 我的 (profile mode) ───

function paintProfile() {
  const me = getMe();
  if (!me) return;
  const fmtDt = (s) => {
    try { return new Date(s).toLocaleDateString('zh-CN', {year:'numeric', month:'2-digit', day:'2-digit'}); }
    catch { return s; }
  };
  document.getElementById('profEmail').textContent = me.email;
  const tierName = { trial: 'trial（试用）', paid: 'paid', admin: 'admin' }[me.tier] || me.tier;
  document.getElementById('profTier').textContent = tierName;
  document.getElementById('profCreated').textContent = fmtDt(me.created_at);
  document.getElementById('profUid').textContent = me.id;
  // Invites: only show for paid + admin
  const invCard = document.getElementById('profInvitesCard');
  invCard.style.display = (me.tier === 'paid' || me.tier === 'admin') ? '' : 'none';
}

// Change-password form (inline in profile)
document.getElementById('profPwForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('profPwMsg');
  const oldPw = document.getElementById('profPwOld').value;
  const newPw = document.getElementById('profPwNew').value;
  const newPw2 = document.getElementById('profPwNew2').value;
  if (newPw !== newPw2) {
    msg.style.color = 'var(--neg)';
    msg.textContent = '两次新密码不一致';
    return;
  }
  msg.style.color = 'var(--muted)';
  msg.textContent = '提交中…';
  try {
    const r = await fetch('/api/me/password', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ old_password: oldPw, new_password: newPw }),
    });
    const j = await r.json();
    if (!r.ok) {
      msg.style.color = 'var(--neg)';
      msg.textContent = j.error || '失败';
      return;
    }
    msg.style.color = 'var(--pos)';
    const dropped = j.other_sessions_dropped || 0;
    msg.textContent = `✓ 已修改${dropped > 0 ? `；其他 ${dropped} 个设备已登出` : ''}`;
    document.getElementById('profPwForm').reset();
  } catch (e) {
    msg.style.color = 'var(--neg)';
    msg.textContent = e.message || '网络错误';
  }
});

// Invites: list + generate
async function refreshInvites() {
  const me = getMe();
  if (!me || (me.tier !== 'paid' && me.tier !== 'admin')) return;
  const r = await fetch('/api/me/invites');
  if (!r.ok) return;
  const j = await r.json();
  const box = document.getElementById('profInvites');
  box.innerHTML = '';
  if (!j.invites || j.invites.length === 0) {
    box.innerHTML = '<div class="empty">还没有邀请码。点上方按钮生成一个。</div>';
    return;
  }
  for (const inv of j.invites) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px dashed var(--line);';
    const code = document.createElement('code');
    code.textContent = inv.code;
    code.style.cssText = 'font-family:ui-monospace,monospace; cursor:pointer';
    code.title = '点击复制';
    code.onclick = () => navigator.clipboard?.writeText(inv.code);
    const meta = document.createElement('span');
    meta.style.cssText = 'color:var(--muted); font-size:12px';
    meta.textContent = `剩 ${inv.uses_remaining} 次`;
    row.appendChild(code);
    row.appendChild(meta);
    box.appendChild(row);
  }
}
document.getElementById('profGenInvite').addEventListener('click', async () => {
  const r = await fetch('/api/me/invites', { method: 'POST' });
  if (r.ok) await refreshInvites();
});

document.getElementById('profLogoutBtn').addEventListener('click', async () => {
  try { await fetch('/api/logout', { method: 'POST' }); } catch {}
  clearAuth();
  location.reload();
});

paintProfile();

function trimPreview(p) {
  let s = typeof p === 'string' ? p : JSON.stringify(p);
  if (!s) return '';
  if (s.length > 180) s = s.slice(0, 180) + '…';
  return s;
}

async function submitMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  send.disabled = true;
  addMessage('user', text);
  const trace = newTrace();
  appendTrace(trace, '<span class="spinner"></span><span class="label">connecting</span>');
  chatHistory.push({ role: 'user', text });

  try {
    const resp = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ message: text, history: chatHistory.slice(0, -1) }),
    });
    // Clear the "connecting…" row but keep the <summary> + <div.trace-body> shells.
    if (trace.body) trace.body.innerHTML = '';
    if (!resp.ok) {
      appendTrace(trace, `<span class="fail">HTTP ${resp.status}</span>`);
      send.disabled = false;
      return;
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let lastIter = -1;
    let finalReply = null;
    let finalIters = 0;
    let ok = true;
    // Streaming asst bubble — grows as token events arrive, gets discarded if
    // the iter ends in a tool call (intermediate "thinking"), promoted to a
    // real message on `done`.
    let liveAsst = null;
    let liveBuf = '';
    const ensureLiveAsst = () => {
      if (!liveAsst) {
        liveAsst = document.createElement('div');
        liveAsst.className = 'msg asst md streaming';
        messages.appendChild(liveAsst);
      }
      return liveAsst;
    };
    const appendToken = (text) => {
      liveBuf += text;
      ensureLiveAsst().innerHTML = renderMarkdown(liveBuf);
      messages.scrollTop = messages.scrollHeight;
    };
    const dropLive = () => {
      if (liveAsst) {
        liveAsst.remove();
        liveAsst = null;
        liveBuf = '';
      }
    };

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) >= 0) {
        const chunk = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        const dataLine = chunk.split('\n').find(l => l.startsWith('data: '));
        if (!dataLine) continue;
        let ev;
        try { ev = JSON.parse(dataLine.slice(6)); } catch { continue; }
        switch (ev.type) {
          case 'start':
            appendTrace(trace, '<span class="label">start</span>');
            break;
          case 'iter':
            if (ev.iter !== lastIter) {
              lastIter = ev.iter;
              trace._iters = (trace._iters || 0) + 1;
              appendTrace(trace, `<span class="label">iter ${ev.iter}</span>`);
            }
            break;
          case 'tool_start':
            trace._tools = (trace._tools || 0) + 1;
            // This iter ended in a tool call — any prose we streamed so far
            // was intermediate thinking, not the final reply. Drop the live
            // bubble; the user will see the tool call in the trace instead.
            dropLive();
            appendTrace(trace, `→ <span class="label">${escapeHtml(ev.name)}</span> <pre>${escapeHtml(trimPreview(ev.args))}</pre>`);
            break;
          case 'tool_end': {
            const klass = ev.ok ? 'ok' : 'fail';
            const mark = ev.ok ? '✓' : '✗';
            appendTrace(trace, `← <span class="${klass}">${mark}</span> ${escapeHtml(ev.name)} <pre>${escapeHtml(trimPreview(ev.preview))}</pre>`);
            break;
          }
          case 'token':
            if (ev.text) appendToken(ev.text);
            break;
          case 'thought':
            // Pre-streaming fallback: PostModel-per-iter full text. With
            // tokens enabled we ignore this — the per-token path already
            // built the live bubble incrementally.
            break;
          case 'done':
            finalReply = ev.reply || '';
            finalIters = ev.iters || 0;
            ok = ev.ok !== false;
            break;
          case 'error':
            appendTrace(trace, `<span class="fail">error: ${escapeHtml(ev.message || '')}</span>`);
            ok = false;
            break;
        }
      }
    }
    if (finalReply !== null) {
      // If we streamed the same text already, finalise the live bubble in
      // place (cheaper + no flicker). Otherwise (e.g. final text differs
      // from streamed accum, or stream produced nothing), drop and emit a
      // fresh formatted message.
      if (liveAsst && liveBuf === finalReply) {
        liveAsst.classList.remove('streaming');
        const m = document.createElement('div');
        m.className = 'iters';
        m.textContent = `${finalIters} iter`;
        liveAsst.appendChild(m);
        liveAsst = null;
        liveBuf = '';
      } else {
        dropLive();
        addMessage('asst', finalReply, finalIters);
      }
      chatHistory.push({ role: 'asst', text: finalReply });
      if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);
    } else {
      dropLive();
    }
    if (!ok) {
      appendTrace(trace, '<span class="fail">未完成或超预算</span>');
    }
    finalizeTrace(trace, {
      iters: finalIters || trace._iters || 0,
      tools: trace._tools || 0,
      ok,
    });
    // refresh whichever dashboard is currently visible — cheap on read
    await Promise.all([refreshLedger(), refreshPortfolio()]);
  } catch (e) {
    appendTrace(trace, '<span class="fail">' + escapeHtml(e.message) + '</span>');
  }
  send.disabled = false;
  input.focus();
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitMessage();
  }
});
