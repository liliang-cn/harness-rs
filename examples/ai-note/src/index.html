<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AI Note · 语义记笔记</title>
<script src="/marked.min.js" defer></script>
<style>
:root {
  --bg: #f6f7f9;
  --panel: #ffffff;
  --ink: #1f2329;
  --muted: #6b7280;
  --line: #e5e7eb;
  --line2: #f0f1f3;
  --accent: #1677ff;
  --accent-bg: #e8f0fe;
  --pos: #16a34a;
  --neg: #dc2626;
  --bubble-user: #d6eaff;
  --bubble-asst: #ffffff;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; margin: 0; overflow: hidden; }
body {
  font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, sans-serif;
  color: var(--ink); background: var(--bg);
  padding-bottom: env(safe-area-inset-bottom, 0);
}

/* ─── auth overlay ─── */
#authOverlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: none; align-items: center; justify-content: center;
  padding: 24px;
}
#authOverlay.on { display: flex; }
.auth-card {
  width: 100%; max-width: 380px;
  background: var(--panel); border-radius: 16px; padding: 28px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.05);
}
.auth-card h1 { margin: 0 0 4px; font-size: 22px; font-weight: 700; }
.auth-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
.auth-tabs { display: flex; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 20px; }
.auth-tab {
  flex: 1; appearance: none; background: transparent; border: 0;
  font: inherit; font-weight: 500; color: var(--muted); cursor: pointer;
  padding: 8px; border-radius: 8px; min-height: 36px;
}
.auth-tab.active { background: var(--panel); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
.field {
  width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px;
  background: var(--bg); color: var(--ink); font: inherit; font-size: 14px;
  margin-bottom: 12px;
}
.field:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.btn-primary {
  width: 100%; padding: 10px; border-radius: 10px; border: 0;
  background: var(--accent); color: #fff; font: inherit; font-weight: 600;
  min-height: 44px; cursor: pointer;
}
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
#authError { color: var(--neg); font-size: 13px; min-height: 18px; margin-top: 8px; }

/* ─── topbar + main layout ─── */
#topbar {
  position: sticky; top: 0; z-index: 10;
  background: var(--panel); border-bottom: 1px solid var(--line);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
}
.app-title { font-weight: 700; font-size: 15px; }
.grow { flex: 1; }
.search-input {
  flex: 1;
  /* Grow as the topbar allows so the placeholder + medium-length queries
     don't truncate. Cap at 720px so on ultra-wide it doesn't dominate. */
  max-width: 720px;
  padding: 7px 14px; border: 1px solid var(--line); border-radius: 8px;
  background: var(--bg); font: inherit; font-size: 14px;
}
.search-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.icon-btn {
  appearance: none; background: transparent; border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px;
  font: inherit; font-size: 13px; color: var(--ink); cursor: pointer;
}
.icon-btn:hover { background: var(--bg); }

#main {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: calc(100vh - 56px);
  height: calc(100dvh - 56px);
  overflow: hidden;
}

#sidebar { border-right: 1px solid var(--line); background: var(--panel); overflow-y: auto; }
.note-row {
  padding: 12px 16px; border-bottom: 1px solid var(--line2);
  cursor: pointer;
}
.note-row:hover { background: var(--bg); }
.note-row.active { background: var(--accent-bg); }
.note-row .nt { font-weight: 600; margin-bottom: 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.note-row .np {
  color: var(--muted); font-size: 12px; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.note-row .nm { color: var(--muted); font-size: 11px; margin-top: 6px; display: flex; gap: 8px; align-items: center; }
.tag-pill { display: inline-block; padding: 1px 7px; border-radius: 4px; background: var(--bg); font-size: 11px; color: #4b5563; }
.score-pill { color: var(--accent); font-family: ui-monospace, Menlo, monospace; }
.empty-list { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 13px; }

#viewer { background: var(--bg); overflow-y: auto; }
#viewer .empty { padding: 64px 24px; text-align: center; color: var(--muted); }
.note-view {
  max-width: 820px; margin: 0 auto; padding: 32px 40px;
}
.note-view .title { font-size: 28px; font-weight: 700; margin: 0 0 8px; line-height: 1.25; }
.note-view .meta { color: var(--muted); font-size: 12px; margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.note-view .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
.note-view .body { font-size: 15px; line-height: 1.7; }
.note-view .body p { margin: 0 0 14px; }
.note-view .body h1, .note-view .body h2, .note-view .body h3 { margin: 24px 0 12px; line-height: 1.3; }
.note-view .body h1 { font-size: 22px; }
.note-view .body h2 { font-size: 19px; }
.note-view .body h3 { font-size: 16px; }
.note-view .body ul, .note-view .body ol { margin: 0 0 14px; padding-left: 26px; }
.note-view .body li { margin: 4px 0; }
.note-view .body code { background: #f1f3f5; padding: 1px 6px; border-radius: 4px;
  font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; font-size: 0.9em; }
.note-view .body pre {
  background: #1f2329; color: #e6e6e6; padding: 14px 16px;
  border-radius: 8px; overflow-x: auto; font-size: 13px;
}
.note-view .body pre code { background: transparent; padding: 0; color: inherit; }
.note-view .body blockquote {
  border-left: 3px solid var(--accent); padding: 4px 14px;
  color: var(--muted); margin: 0 0 14px;
}
.note-view .body table { border-collapse: collapse; margin: 0 0 14px; }
.note-view .body th, .note-view .body td { border: 1px solid var(--line); padding: 6px 12px; }
.note-view .actions {
  position: sticky; top: 0; background: linear-gradient(to bottom, var(--bg), transparent);
  padding: 12px 0; margin: -12px 0 8px;
  display: flex; gap: 8px; flex-wrap: wrap; z-index: 1;
}

/* ─── floating new + chat buttons ─── */
.fab {
  position: fixed; right: 20px;
  width: 56px; height: 56px; border-radius: 50%; border: 0;
  font-size: 24px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
#fabChat { bottom: 24px; background: var(--accent); color: #fff; }
#fabChat:hover { transform: scale(1.05); }

/* ─── chat panel (slide-in from right) ─── */
#chatPanel {
  position: fixed; right: 0; bottom: 0; top: 56px;
  width: 420px; max-width: 100%; z-index: 101;
  background: var(--panel); border-left: 1px solid var(--line);
  transform: translateX(100%); transition: transform .22s ease;
  display: flex; flex-direction: column;
}
#chatPanel.on { transform: translateX(0); }
.chat-header { padding: 12px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
.chat-header .h { font-weight: 600; font-size: 14px; }
.chat-close { appearance: none; background: transparent; border: 0; font-size: 18px; color: var(--muted); cursor: pointer; padding: 4px 8px; }
.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 88%; padding: 10px 14px; border-radius: 14px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: var(--bubble-user); }
.msg.asst { align-self: flex-start; background: var(--bubble-asst); border: 1px solid var(--line); }
.msg.asst.md { white-space: normal; }
.msg.asst.md p { margin: 0 0 6px; } .msg.asst.md p:last-child { margin-bottom: 0; }
.msg.asst.md ul, .msg.asst.md ol { margin: 4px 0 8px; padding-left: 22px; }
.msg.asst.md code { background: rgba(0,0,0,0.07); padding: 1px 5px; border-radius: 3px;
  font-family: ui-monospace, Menlo, monospace; font-size: 0.9em; }
.msg.meta { align-self: stretch; color: var(--muted); font-size: 11px; text-align: center; background: transparent; padding: 4px 0; }
.composer {
  border-top: 1px solid var(--line); padding: 10px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  display: flex; gap: 8px;
}
.composer textarea {
  flex: 1; resize: none; padding: 10px 12px; border-radius: 12px;
  border: 1px solid var(--line); background: var(--bg); color: var(--ink); font: inherit;
  min-height: 44px; max-height: 140px;
}
.composer button {
  min-width: 60px; min-height: 44px; padding: 0 14px;
  border-radius: 12px; border: 0; background: var(--accent); color: #fff;
  font: inherit; font-weight: 600; cursor: pointer;
}
.composer button:disabled { opacity: 0.5; cursor: not-allowed; }

/* ─── new note modal ─── */
.modal-bg {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.45);
  display: none; align-items: center; justify-content: center; padding: 16px;
}
.modal-bg.on { display: flex; }
.modal {
  width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto;
  background: var(--panel); border-radius: 14px; padding: 24px;
  display: flex; flex-direction: column; gap: 12px;
}
.modal h3 { margin: 0; font-size: 16px; }
.modal textarea { min-height: 200px; padding: 12px; border: 1px solid var(--line);
  border-radius: 10px; font: inherit; font-size: 14px; resize: vertical; background: var(--bg); }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-ghost { appearance: none; background: transparent; border: 1px solid var(--line);
  border-radius: 10px; padding: 8px 14px; cursor: pointer; font: inherit; }

/* toast */
#toast {
  position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
  background: rgba(0,0,0,0.85); color: #fff; padding: 8px 14px;
  border-radius: 8px; font-size: 13px; z-index: 9999;
  opacity: 0; transition: opacity .15s; pointer-events: none;
}

/* mobile */
@media (max-width: 760px) {
  /* Topbar: 1-line, compact. Search grows; buttons shrink to icons. */
  #topbar { padding: 8px 12px; gap: 6px; flex-wrap: nowrap; min-height: 52px; }
  .app-title { font-size: 0; line-height: 1; }
  .app-title::before { content: "📓"; font-size: 22px; line-height: 1; }
  .search-input { font-size: 16px; max-width: none; min-width: 0; flex: 1; padding: 8px 12px; }
  /* Hide text labels on action buttons; keep symbols. */
  .icon-btn { padding: 8px 10px; font-size: 16px; }
  .icon-btn .lbl { display: none; }

  #main {
    display: block;
    height: calc(100dvh - 52px);
    overflow: hidden;
  }
  /* Default: sidebar visible, viewer hidden until a note is opened. */
  #sidebar { display: block; height: 100%; border-right: none; }
  #viewer { display: none; height: 100%; }
  /* When a note is opened, JS swaps these classes. */
  #sidebar.hidden-on-mobile { display: none; }
  #viewer.visible-on-mobile { display: block; }

  .note-view { padding: 18px 16px 80px; }
  .note-view .title { font-size: 22px; }
  .note-view .body { font-size: 16px; }
  .note-view .actions {
    flex-wrap: wrap; gap: 6px;
    padding: 10px 0;
  }
  .note-view .actions .icon-btn { padding: 8px 12px; font-size: 13px; }

  /* Chat panel: full screen, slide in from right. */
  #chatPanel { width: 100%; top: 0; }
  .messages { padding: 14px; }
  .composer { padding-bottom: max(10px, env(safe-area-inset-bottom)); }
  .composer textarea { font-size: 16px; }  /* prevent iOS zoom on focus */

  /* FAB: respect home-indicator safe area. */
  #fabChat { bottom: max(20px, calc(env(safe-area-inset-bottom) + 12px)); }

  /* New-note modal: full-width-ish on phone */
  .modal-bg { padding: 0; align-items: flex-end; }
  .modal {
    width: 100%; max-width: none; max-height: 92dvh;
    border-radius: 16px 16px 0 0;
    padding: 18px 16px calc(18px + env(safe-area-inset-bottom));
  }
  .field { font-size: 16px; }
  .modal textarea { font-size: 16px; }
}
</style>
</head>
<body>

<!-- Auth overlay -->
<div id="authOverlay">
  <div class="auth-card">
    <h1>AI Note</h1>
    <div class="sub">用自然语言记笔记 · 语义搜索</div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-mode="login">登录</button>
      <button class="auth-tab" data-mode="register">注册</button>
    </div>
    <form id="authForm">
      <input class="field" id="authEmail" type="email" placeholder="邮箱" autocomplete="email" required />
      <input class="field" id="authPassword" type="password" placeholder="密码" autocomplete="current-password" required />
      <input class="field" id="authInvite" type="text" placeholder="邀请码（注册时填可升级 paid）" style="display:none" />
      <button class="btn-primary" id="authSubmit" type="submit">登录</button>
      <div id="authError"></div>
    </form>
  </div>
</div>

<!-- Topbar -->
<div id="topbar">
  <span class="app-title">📓 AI Note</span>
  <input id="searchInput" class="search-input" placeholder="搜索（语义 · 中英都行）" />
  <span class="grow"></span>
  <button class="icon-btn" id="btnNew" title="新笔记">＋<span class="lbl"> 新笔记</span></button>
  <button class="icon-btn" id="btnLogout" title="登出">⎋</button>
</div>

<!-- Main two-pane layout -->
<div id="main">
  <aside id="sidebar"><div class="empty-list">加载中…</div></aside>
  <section id="viewer"><div class="empty">从左侧选一条笔记，或者点右下角💬跟 AI 聊。</div></section>
</div>

<!-- Floating chat button -->
<button class="fab" id="fabChat" title="跟 AI 聊">💬</button>

<!-- Chat panel -->
<div id="chatPanel">
  <div class="chat-header">
    <span class="h">💬 AI · 帮我记 / 找笔记</span>
    <span class="grow"></span>
    <button class="chat-close" id="chatClose" aria-label="关闭">✖</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="composer">
    <textarea id="chatInput" placeholder='例：「记一下：今天读了《活着》」 / 「上周写过什么？」' enterkeyhint="send"></textarea>
    <button id="chatSend">发送</button>
  </div>
</div>

<!-- New note modal -->
<div class="modal-bg" id="newModal">
  <div class="modal">
    <h3>新笔记</h3>
    <input class="field" id="newTitle" placeholder="标题（可选）" />
    <textarea id="newBody" placeholder="正文 · 支持 markdown" required></textarea>
    <input class="field" id="newTags" placeholder="标签（逗号分隔，可选）" />
    <div class="actions">
      <button class="btn-ghost" id="newCancel">取消</button>
      <button class="btn-primary" id="newSave" style="width:auto;padding:8px 18px;">保存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── auth + fetch ───
const TOKEN_KEY = 'ai-note-token';
const ME_KEY = 'ai-note-me';
const $ = (id) => document.getElementById(id);

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setAuth(token, user) {
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(ME_KEY, JSON.stringify(user));
}
function clearAuth() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(ME_KEY);
}

const _raw = window.fetch.bind(window);
window.fetch = async (url, opts = {}) => {
  const t = getToken();
  if (t) {
    opts.headers = Object.assign({}, opts.headers || {}, { Authorization: 'Bearer ' + t });
  }
  const r = await _raw(url, opts);
  if (r.status === 401 && (url + '').includes('/api/') && !(url + '').endsWith('/api/login') && !(url + '').endsWith('/api/register')) {
    clearAuth();
    showAuth();
  }
  return r;
};

function showAuth() { $('authOverlay').classList.add('on'); }
function hideAuth() { $('authOverlay').classList.remove('on'); }

document.querySelectorAll('.auth-tab').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.auth-tab').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  const isReg = b.dataset.mode === 'register';
  $('authInvite').style.display = isReg ? '' : 'none';
  $('authSubmit').textContent = isReg ? '注册' : '登录';
  $('authError').textContent = '';
}));

$('authForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const isReg = document.querySelector('.auth-tab.active').dataset.mode === 'register';
  const url = isReg ? '/api/register' : '/api/login';
  const body = {
    email: $('authEmail').value.trim(),
    password: $('authPassword').value,
  };
  if (isReg) {
    const inv = $('authInvite').value.trim();
    if (inv) body.invite_code = inv;
  }
  $('authError').textContent = '…';
  $('authSubmit').disabled = true;
  try {
    const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      $('authError').textContent = j.error || `失败 (${r.status})`;
      return;
    }
    const j = await r.json();
    setAuth(j.token, j.user);
    $('authError').textContent = '';
    hideAuth();
    refreshNotes();
  } finally {
    $('authSubmit').disabled = false;
  }
});

if (!getToken()) setTimeout(showAuth, 0);

// ─── toast ───
let _toastT;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(_toastT);
  _toastT = setTimeout(() => t.style.opacity = '0', 1500);
}

// ─── note list + search ───
let allNotes = [];        // recent listing
let activeId = null;
let searchTimer = null;

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) {
    return d.toTimeString().slice(0, 5);
  }
  return d.toISOString().slice(5, 10);  // MM-DD
}
function tagsHtml(tags, scoreOpt) {
  const parts = (tags || []).map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`);
  if (scoreOpt !== undefined) {
    parts.push(`<span class="score-pill">${scoreOpt.toFixed(2)}</span>`);
  }
  return parts.join('');
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderList(notes, withScore) {
  const box = $('sidebar');
  if (!notes || notes.length === 0) {
    box.innerHTML = '<div class="empty-list">还没有笔记。点右上「+ 新笔记」或跟右下的 💬 AI 说一句。</div>';
    return;
  }
  box.innerHTML = notes.map(n => `
    <div class="note-row ${n.id === activeId ? 'active' : ''}" data-id="${escapeHtml(n.id)}">
      <div class="nt">${escapeHtml(n.title || (n.body || '').slice(0, 32))}</div>
      <div class="np">${escapeHtml((n.body || '').replace(/\s+/g, ' ').slice(0, 110))}</div>
      <div class="nm">
        <span>${escapeHtml(fmtDate(n.updated_at))}</span>
        ${tagsHtml(n.tags, withScore ? n.score : undefined)}
      </div>
    </div>`).join('');
  for (const row of box.querySelectorAll('.note-row')) {
    row.addEventListener('click', () => openNote(row.dataset.id));
  }
}

async function refreshNotes() {
  if (!getToken()) return;
  try {
    const r = await fetch('/api/notes?limit=200').then(r => r.json());
    allNotes = r.notes || [];
    renderList(allNotes, false);
  } catch (e) { console.warn('list', e); }
}

$('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.trim();
  clearTimeout(searchTimer);
  if (!q) { renderList(allNotes, false); return; }
  searchTimer = setTimeout(async () => {
    try {
      const r = await fetch(`/api/notes/search?q=${encodeURIComponent(q)}&limit=30`).then(r => r.json());
      renderList(r.hits || [], true);
    } catch {}
  }, 220);
});

// ─── note view ───
async function openNote(id) {
  activeId = id;
  // highlight in list
  document.querySelectorAll('.note-row').forEach(r => {
    r.classList.toggle('active', r.dataset.id === id);
  });
  try {
    const r = await fetch(`/api/notes/${id}`).then(r => r.json());
    if (!r.note) { $('viewer').innerHTML = `<div class="empty">没找到这条笔记</div>`; return; }
    renderViewer(r.note);
    // on mobile, hide sidebar and reveal viewer
    if (window.innerWidth <= 760) {
      $('sidebar').classList.add('hidden-on-mobile');
      $('viewer').classList.add('visible-on-mobile');
      window.scrollTo(0, 0);
    }
  } catch (e) {
    $('viewer').innerHTML = `<div class="empty">加载失败</div>`;
  }
}

function renderViewer(note) {
  const v = $('viewer');
  const rendered = window.marked
    ? window.marked.parse(note.body || '', { breaks: true, gfm: true })
    : '<pre>' + escapeHtml(note.body || '') + '</pre>';
  const tags = (note.tags || []).map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('');
  const updated = note.updated_at ? new Date(note.updated_at).toLocaleString() : '';
  v.innerHTML = `
    <article class="note-view">
      <div class="actions">
        ${window.innerWidth <= 760 ? '<button class="icon-btn" id="backToList">← 列表</button>' : ''}
        <button class="icon-btn" id="actEdit">编辑</button>
        <a class="icon-btn" href="/api/notes/${encodeURIComponent(note.id)}/export.md?_auth=1" id="actExport">⬇ 导出 .md</a>
        <button class="icon-btn" id="actDelete" style="color:var(--neg)">删除</button>
      </div>
      <h1 class="title">${escapeHtml(note.title || '无标题')}</h1>
      <div class="meta">
        <span>${updated}</span>
        <span style="font-family:ui-monospace,Menlo,monospace;color:var(--muted)">${escapeHtml(note.id)}</span>
      </div>
      ${tags ? `<div class="tags">${tags}</div>` : ''}
      <div class="body">${rendered}</div>
    </article>`;
  // wire actions
  v.querySelector('#actEdit')?.addEventListener('click', () => openEdit(note));
  v.querySelector('#actDelete')?.addEventListener('click', () => deleteNote(note.id));
  v.querySelector('#actExport')?.addEventListener('click', (e) => {
    e.preventDefault();
    downloadNoteMd(note.id);
  });
  v.querySelector('#backToList')?.addEventListener('click', () => {
    $('sidebar').classList.remove('hidden-on-mobile');
    $('viewer').classList.remove('visible-on-mobile');
  });
}

async function downloadNoteMd(id) {
  try {
    const r = await fetch(`/api/notes/${id}/export.md`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const cd = r.headers.get('content-disposition') || '';
    const m = cd.match(/filename="?([^";]+)"?/i);
    const name = m ? m[1] : `${id}.md`;
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast('✓ 已导出');
  } catch (e) { toast('导出失败: ' + e.message); }
}

async function deleteNote(id) {
  if (!confirm('删除这条笔记？不可恢复。')) return;
  const r = await fetch(`/api/notes/${id}`, { method: 'DELETE' });
  if (r.ok) {
    activeId = null;
    $('viewer').innerHTML = `<div class="empty">已删除。</div>`;
    refreshNotes();
    toast('已删除');
  } else { toast('删除失败'); }
}

// ─── new / edit modal ───
let editingId = null;
$('btnNew').addEventListener('click', () => openEdit(null));
$('newCancel').addEventListener('click', () => $('newModal').classList.remove('on'));
$('newSave').addEventListener('click', async () => {
  const title = $('newTitle').value.trim();
  const body = $('newBody').value;
  const tagsStr = $('newTags').value.trim();
  if (!body.trim()) { toast('正文不能为空'); return; }
  const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [];
  try {
    let id;
    if (editingId) {
      const r = await fetch(`/api/notes/${editingId}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body, tags }),
      });
      if (!r.ok) throw new Error('save failed');
      id = editingId;
    } else {
      const r = await fetch('/api/notes', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body, tags }),
      });
      if (!r.ok) throw new Error('create failed');
      const j = await r.json();
      id = j.note.id;
    }
    $('newModal').classList.remove('on');
    await refreshNotes();
    openNote(id);
    toast(editingId ? '已更新' : '已创建');
  } catch (e) { toast(e.message); }
});

function openEdit(note) {
  editingId = note ? note.id : null;
  $('newTitle').value = note ? (note.title || '') : '';
  $('newBody').value = note ? (note.body || '') : '';
  $('newTags').value = note ? (note.tags || []).join(', ') : '';
  $('newModal').classList.add('on');
  setTimeout(() => $('newBody').focus(), 60);
}

// ─── chat ───
const messages = $('messages');
const chatInput = $('chatInput');
const chatSend = $('chatSend');
const chatPanel = $('chatPanel');

$('fabChat').addEventListener('click', () => chatPanel.classList.add('on'));
$('chatClose').addEventListener('click', () => chatPanel.classList.remove('on'));

function addMsg(role, text, opts = {}) {
  const d = document.createElement('div');
  d.className = 'msg ' + role + (opts.md ? ' md' : '');
  if (opts.md && window.marked) {
    d.innerHTML = window.marked.parse(text || '', { breaks: true, gfm: true });
  } else {
    d.textContent = text || '';
  }
  messages.appendChild(d);
  messages.scrollTop = messages.scrollHeight;
  return d;
}

let chatHistory = [];

async function chatSubmit() {
  const text = chatInput.value.trim();
  if (!text || chatSend.disabled) return;
  chatInput.value = '';
  addMsg('user', text);
  chatHistory.push({ role: 'user', text });
  chatSend.disabled = true;
  const thinking = addMsg('meta', '思考中…');
  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: chatHistory.slice(-20) }),
    });
    const j = await r.json();
    thinking.remove();
    addMsg('asst', j.reply || '(空回复)', { md: true });
    chatHistory.push({ role: 'asst', text: j.reply || '' });
    // refresh list — agent might have created/updated/deleted notes
    refreshNotes();
  } catch (e) {
    thinking.remove();
    addMsg('asst', '出错了：' + e.message);
  } finally {
    chatSend.disabled = false;
    chatInput.focus();
  }
}

chatSend.addEventListener('click', chatSubmit);
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    chatSubmit();
  }
});

$('btnLogout').addEventListener('click', async () => {
  try { await fetch('/api/logout', { method: 'POST' }); } catch {}
  clearAuth();
  location.reload();
});

// ─── kickoff ───
if (getToken()) refreshNotes();
</script>

</body>
</html>
