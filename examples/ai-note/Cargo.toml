[package]
name = "ai-note"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish = false
description = "AI-driven note app with semantic search. Multi-tenant, embedded UI."

[[bin]]
name = "ai-note"
path = "src/main.rs"

[dependencies]
harness            = { workspace = true }
harness-core       = { workspace = true }
harness-loop       = { workspace = true }
harness-models     = { workspace = true }
harness-context    = { workspace = true }
harness-skills     = { workspace = true }
harness-permissions= { workspace = true }
argon2             = "0.5"
rand               = "0.8"
hex                = "0.4"
tokio              = { workspace = true, features = ["io-std", "net", "signal", "macros", "rt-multi-thread", "time", "sync"] }
anyhow             = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
clap               = { workspace = true }
async-trait        = { workspace = true }
chrono             = { version = "0.4", features = ["serde"] }
uuid               = { version = "1", features = ["v4"] }
rusqlite           = { version = "0.32", features = ["bundled", "chrono"] }
axum               = { version = "0.7", default-features = false, features = ["http1", "json", "tokio", "query"] }
tower-http         = { version = "0.5", features = ["cors"] }
tokio-stream       = "0.1"
futures            = { workspace = true }
reqwest            = { workspace = true }
thiserror          = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
