[package]
name = "harness-rs-tools-tasks"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Background-task primitives for harness-rs agents: a TaskStore trait + 4 tools (tasks_create, tasks_list, tasks_get, tasks_cancel) so the LLM can dispatch and inspect deferred work. Ships a JSON-file-backed store; tie to harness-rs-daemon (or your own runner) for execution."

keywords     = ["agent", "ai", "llm", "harness", "tasks"]
categories   = ["asynchronous", "development-tools"]
readme       = "../../README.md"
[lib]
name = "harness_tools_tasks"
path = "src/lib.rs"

[dependencies]
harness-core    = { workspace = true }
async-trait     = { workspace = true }
serde           = { workspace = true }
serde_json      = { workspace = true }
chrono          = { workspace = true }
tokio           = { workspace = true }
thiserror       = { workspace = true }
tracing         = { workspace = true }
uuid            = { version = "1", features = ["v4"] }

[dev-dependencies]
tempfile        = "3"
tokio           = { workspace = true, features = ["macros"] }
