[package]
name = "harness-rs"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Rust agent framework based on harness-engineering principles (Lopopolo, Böckeler). Facade re-exporting the public surface of the harness-rs-* crates."

keywords     = ["agent", "ai", "llm", "harness"]
categories   = ["asynchronous", "development-tools"]
readme       = "README.md"

# Keep the in-source crate name as `harness` even though the published package
# name is `harness-rs` (the bare `harness` was already taken on crates.io).
# Lets users write `use harness::prelude::*;` without an aliasing trick.
[lib]
name = "harness"
path = "src/lib.rs"

[dependencies]
harness-core    = { workspace = true }
harness-skills  = { workspace = true }
harness-macros  = { workspace = true }
inventory       = { workspace = true }

[dev-dependencies]
harness-context = { workspace = true }
serde_json      = { workspace = true }
tokio           = { workspace = true }
